<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christel Biau Coaching — UI Kit v2</title>
<style>
  @font-face {
    font-family: 'Christel';
    src: url('fonts/fontchristel.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: #fff; font-family: 'Lato', sans-serif; color: #212121; }
  #root { min-height: 100vh; }

  /* Audience card gradient border — signature brand element */
  .audience-card {
    position: relative; border-radius: 8px; overflow: hidden;
    border: 3px solid transparent;
    background: linear-gradient(#111,#111) padding-box,
                linear-gradient(135deg, #ffa64d, #ff9020, #c62828) border-box;

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── Shared helpers ─────────────────────────────────────── */
const ASSETS = 'assets/';

const Btn = ({ children, variant='primary', onClick, style={} }) => {
  const base = { fontFamily:"'Lato',sans-serif", fontSize:13, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', padding:'13px 28px', borderRadius:4, border:'none', cursor:'pointer', transition:'all 150ms ease', display:'inline-block', ...style };
  const variants = {
    primary: { background:'#c62828', color:'#fff' },
    accent:  { background:'#ff9020', color:'#fff' },
    outline: { background:'transparent', color:'#c62828', border:'2px solid #c62828' },
    dark:    { background:'#1a1a1a', color:'#fff' },
    light:   { background:'#fff', color:'#c62828' },
  };
  return <button style={{...base, ...variants[variant]}} onClick={onClick}>{children}</button>;
};

/* ── Nav ────────────────────────────────────────────────── */
const Nav = ({ page, go }) => {
  const [prog, setProg] = React.useState(false);
  return (
    <div style={{ position:'sticky', top:0, zIndex:100 }}>
      {/* Banner */}
      <div style={{ background:'#c62828', color:'#fff', textAlign:'center', padding:'8px 16px', fontSize:12, fontFamily:"'Lato',sans-serif", fontWeight:700, letterSpacing:'0.06em' }}>
        1 AUDIO OFFERT chaque semaine par email &nbsp;
        <span style={{ color:'#ffa64d', textDecoration:'underline', cursor:'pointer' }}>Recevoir →</span>
      </div>
      {/* Nav bar */}
      <nav style={{ background:'#fff', boxShadow:'0 2px 8px rgba(0,0,0,0.10)', padding:'0 48px', height:64, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div onClick={() => go('home')} style={{ cursor:'pointer', display:'flex', alignItems:'center', gap:12 }}>
          <img src={ASSETS+'logo.jpg'} alt="Logo" style={{ height:48, width:48, borderRadius:'50%', objectFit:'cover' }} />
          <span style={{ fontFamily:"'Christel',cursive", fontSize:26, color:'#212121' }}>Christel Biau Coaching</span>
        </div>
        <div style={{ display:'flex', gap:24, alignItems:'center' }}>
          {[['home','Accueil'],['about','Qui suis-je'],['accompagnements','Accompagnements']].map(([id,label]) => (

          ))}
          <div style={{ position:'relative' }} onMouseEnter={() => setProg(true)} onMouseLeave={() => setProg(false)}>

        </div>
      </nav>
    </div>
  );
};
